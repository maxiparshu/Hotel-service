server:
  port: ${SERVER_PORT:9000}
spring:
  datasource:
    url: jdbc:h2:mem:catalogdb;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE
    driverClassName: org.h2.Driver
    username: maxim
    password: 123

  h2:
    console:
      enabled: true
      path: /h2-catalog-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      continue-on-error: true
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true

logging:
  level:
    org.springframework.jdbc.datasource.init: DEBUG