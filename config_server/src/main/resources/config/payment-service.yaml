server:
  port: ${SERVER_PORT:9004}

spring:
  datasource:
    url: jdbc:h2:file:/data/paymentdb;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE
    driverClassName: org.h2.Driver
    username: maxim
    password: 123

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: guest
    password: guest
    dynamic: true
    listener:
      simple:
        default-requeue-rejected: false


  h2:
    console:
      enabled: true
      path: /h2-payment-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      continue-on-error: true
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    prefer-ip-address: true

