x-environment: &default-env
  CONFIG_SERVER_URL: http://config-server:8887
  EUREKA_SERVER_URL: http://eureka-server:8781/eureka
  MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: 5672
  SPRING_RABBITMQ_USERNAME: guest
  SPRING_RABBITMQ_PASSWORD: guest

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5677:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

  config-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: config_server
    container_name: config-server
    ports:
      - "8887:8887"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8887/actuator/health || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 10

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: eureka-server
    container_name: eureka-server
    ports:
      - "8781:8781"
    environment:
      <<: *default-env
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8781/actuator/health || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway
    ports:
      - "8084:8084"
    environment:
      <<: *default-env
    depends_on:
      eureka-server:
        condition: service_healthy
      zipkin:
        condition: service_started

  catalog-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: catalog-service
    container_name: catalog-service
    environment:
      <<: *default-env
      SERVER_PORT: 9000
    ports:
      - "9000:9000"
    volumes:
      - catalog-db:/data
    depends_on:
      api-gateway:
        condition: service_started

  booking-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: booking-service
    container_name: booking-service
    environment:
      <<: *default-env
      SERVER_PORT: 9001
    ports:
      - "9001:9001"
    volumes:
      - booking-db:/data
    depends_on:
      api-gateway:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth-service
    container_name: auth-service
    environment:
      <<: *default-env
      SERVER_PORT: 9002
    ports:
      - "9002:9002"
    volumes:
      - auth-db:/data
    depends_on:
      api-gateway:
        condition: service_started

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: payment-service
    container_name: payment-service
    environment:
      <<: *default-env
      SERVER_PORT: 9003
    ports:
      - "9003:9003"
    volumes:
      - payment-db:/data
    depends_on:
      api-gateway:
        condition: service_started
      rabbitmq:
        condition: service_healthy

volumes:
  catalog-db:
  booking-db:
  auth-db:
  payment-db: